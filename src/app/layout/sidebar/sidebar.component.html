<div id="app-sidebar" class="sidebar" [class.open]="isOpen">
    <label for="sidebar-search" class="sr-only">Pesquisar no mapa</label>
    <button class="sidebar-close" aria-label="Fechar menu lateral" (click)="sidebarService.close()">Fechar</button>
    <input id="sidebar-search" type="search" class="input-container" placeholder="O que você procura?" aria-label="Pesquisar no mapa">
    <ul class="list-group-pages">
        <li *ngFor="let item of sidebarItems" [routerLink]="item.url" class="d-flex align-items-center justify-content-between consola-mono-bold">
            <a class="d-flex w-100 justify-content-between" [attr.aria-label]="'Ir para ' + item.name">
                <strong>{{ item.name }}</strong>
                <i class="golden-arrow-icon" aria-hidden="true"> &gt;&gt;</i>
            </a>
        </li>
    </ul>

    <h4 class="oferta-do-dia text-sm">
        SELECIONE O QUE VOCÊ QUER VER
    </h4>
    <ul class="list-group-filters-locais">
        <li *ngFor="let local of locais" class="consola-mono">
            <div class="before-item"></div>
            <img [src]="local.icon" class="category-icon" alt="Ícone de {{local.name}}" srcset="">
            <span> {{local.name}}</span>
        </li>
    </ul>


    <ul class="list-group-filters-categorias">
        <li *ngFor="let categoria of categorias" class="consola-mono">
            <div class="before-item" [ngClass]="'bg-'+categoria.color"></div>
            <img class="icon-categoria" [src]="categoria.icon" alt="Ícone de {{categoria.name}}" srcset="">
            <span> {{categoria.name}}</span>
        </li>
    </ul>

</div>
